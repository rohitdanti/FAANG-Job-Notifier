name: Multi-Company Jobs Full Scrape

on:
  workflow_dispatch:
    inputs:
      companies:
        description: Comma-separated company slugs to seed into seen_jobs/
        required: false
        default: apple,amazon,goldman-sachs,google,meta,salesforce

permissions:
  contents: write

jobs:
  full-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run full scraper
        env:
          COMPANIES: ${{ inputs.companies }}
        run: python full_scrape.py

      - name: Commit updated seen-job files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen_jobs
          git diff --cached --quiet || git commit -m "chore: full scrape - update seen jobs [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
